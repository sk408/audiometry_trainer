<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audiometry Trainer - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Roboto", "Helvetica", "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #2196f3; }
    p { margin-bottom: 1rem; line-height: 1.6; }
    button {
      background: #2196f3;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1976d2; }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're Offline</h1>
    <p>Audiometry Trainer requires an internet connection for the first load. Once cached, most features will work offline.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
